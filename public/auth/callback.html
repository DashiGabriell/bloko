<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticando... - BLOKO</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #2a2a4a;
      border-top-color: #00aaff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #8899bb; font-size: 16px; }
    .error { color: #ff4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p id="status">Autenticando...</p>
  </div>

  <script type="module">
    try {
      const res = await fetch('/api/auth/config');
      const config = await res.json();

      if (!config.supabaseUrl || !config.supabaseKey) {
        throw new Error('Config de auth não disponível');
      }

      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
      const supabase = createClient(config.supabaseUrl, config.supabaseKey);

      const { data: { session }, error } = await supabase.auth.getSession();

      if (error || !session) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('status').textContent = 'Falha na autenticação. Redirecionando...';
        document.getElementById('status').className = 'error';
        setTimeout(() => { window.location.href = '/'; }, 2000);
        return;
      }

      window.location.href = '/jogo';
    } catch (err) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'Erro: ' + err.message;
      document.getElementById('status').className = 'error';
      setTimeout(() => { window.location.href = '/'; }, 3000);
    }
  </script>
</body>
</html>
